<p class=MsoNormal style='text-indent:21.0pt'><span style='font-family:宋体'>在员工查询结果列表中，最右边一列，显示的是员工的</span><span
lang=EN-US>RTX</span><span style='font-family:宋体'>帐号；</span></p>

<p class=MsoNormal style='text-indent:21.0pt'><span style='font-family:宋体'>鼠标移动到帐号左边的头像上（离线为灰色，在线为蓝色），即可显示</span><span
lang=EN-US>RTX</span><span style='font-family:宋体'>的快捷菜单，包括：发送即时消息，发送音频会话，发送视频会话，发送手机消息，发送文件，查看详细资料等；</span></p>

<p class=MsoNormal style='text-indent:21.0pt'><span style='font-family:宋体'>如果该用户在线的话，点击即可和该用户通过</span><span
lang=EN-US>RTX</span><span style='font-family:宋体'>进行沟通。</span></p>
