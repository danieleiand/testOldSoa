<div class=Section1 style='layout-grid:15.6pt'>



<p class=MsoNormal style='text-indent:21.0pt'><span style='font-family:宋体'>如果需要修改日程信息，请在日历界面上，点击日程项目（蓝色条状），弹出该日程修改界面：</span></p>

<p class=MsoNormal><span lang=EN-US><img border=0 width=670 height=517
src="temp.files/image020.jpg"></span></p>

<p class=MsoNormal><span style='font-family:宋体'>输入需要修改的信息，点击保存！</span></p>

<p class=MsoNormal><span lang=EN-US>&nbsp;</span></p>

<p class=MsoNormal><span style='font-family:宋体'>提示：</span></p>

<p class=MsoNormal style='margin-left:18.0pt;text-indent:-18.0pt'><span
lang=EN-US>1，<span style='font:7.0pt "Times New Roman"'>&nbsp; </span></span><span
style='font-family:宋体'>你也可以通过拖动日程项目（蓝色条状），来直观的改变日程时间、</span></p>

<p class=MsoNormal style='margin-left:18.0pt;text-indent:-18.0pt'><span
lang=EN-US>2，<span style='font:7.0pt "Times New Roman"'>&nbsp; </span></span><span
style='font-family:宋体'>鼠标移动到蓝色条状的右边界，等鼠标指针变成左右双向箭头时，拖动鼠标可以拉长和缩短日程开始到结束的时间。</span></p>


</div>
