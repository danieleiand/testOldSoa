<div class=Section1 style='layout-grid:15.6pt'>



<p class=MsoNormal style='text-indent:21.0pt'><span style='font-family:宋体'>考虑到本系统是公司业务支撑系统，数据的重要性是不言而喻的。所以每一个系统的操作用户有责任保管好自己的用户名和密码，初次登录后请参考下图，</span><span
style='font-family:宋体'>点击系统菜单</span><span lang=EN-US> SOA</span><span
style='font-family:宋体'>平台</span><span lang=EN-US> &gt;&gt; </span><span
style='font-family:宋体'>密码修改，</span><span style='font-family:宋体'>立刻更改自己的密码；如果发现自己的密码有泄密的可能无法登录，应尽快和系统管理员联系，修改自己的密码。</span></p>
