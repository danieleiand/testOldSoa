<div class=Section1 style='layout-grid:15.6pt'>



<p class=MsoNormal style='text-indent:21.0pt'><span style='font-family:宋体'>文档目录树支持多级文档目录，文档目录分为主目录</span><span
lang=EN-US>/</span><span style='font-family:宋体'>分目录</span><span lang=EN-US>/</span><span
style='font-family:宋体'>子目录，在文档目录树下可以创建主目录，在主目录目录下可以创建分目录和子目录，在分目录下也可以创建分目录和子目录，只能在子目录下设置文档创建权限</span><span
lang=EN-US>/</span><span style='font-family:宋体'>文档共享权限</span><span lang=EN-US>/</span><span
style='font-family:宋体'>文档模板，具体文档是挂接在子目录下。</span></p>
