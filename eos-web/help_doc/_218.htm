<div class=Section1 style='layout-grid:15.6pt'>



<p class=MsoNormal style='text-indent:21.0pt'><span style='font-family:宋体'>文档模板维护是对子目录可以建立多个模板文件，在文件创建的时候可以选择根据某个模板进行快速创建。</span></p>

<p class=MsoNormal style='text-indent:21.0pt'><span style='font-family:宋体'>模板类型有</span><span
lang=EN-US>html,word,excl,ppt,visio,wps,</span><span style='font-family:宋体'>金山表格。</span></p>

<p class=MsoNormal align=center style='text-align:center'><span lang=EN-US><img
border=0 width=588 height=140 src="temp.files/image231.jpg"></span></p>

<p class=MsoNormal align=center style='text-align:center'><span
style='font-family:宋体'>文档模板列表界面</span></p>

<p class=MsoNormal style='text-indent:21.0pt'><span style='font-family:宋体'>在模板列表中可以对文档模板进行修改和删除操作；选择模板类型，点击</span>
<span style='font-family:宋体'>【创建模板】按钮，可以创建文档模板。</span></p>

<p class=MsoNormal style='text-indent:21.0pt'><span lang=EN-US>&nbsp;</span></p>

<p class=MsoNormal align=center style='text-align:center'><span lang=EN-US><img
border=0 width=587 height=310 src="temp.files/image232.jpg"></span></p>

<p class=MsoNormal align=center style='text-align:center'><span lang=EN-US>Html</span><span
style='font-family:宋体'>格式</span> <span style='font-family:宋体'>文档模板创建</span><span
lang=EN-US>/</span><span style='font-family:宋体'>修改界面</span></p>
