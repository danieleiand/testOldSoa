<div class=Section1 style='layout-grid:15.6pt'>



<p class=MsoNormal style='text-indent:21.0pt'><span style='font-family:宋体'>在文档目录树中选择子目录，再选择【文档共享权限】，进入此功能界面。文档共享权限可以授权给人员、机构、角色。</span></p>

<p class=MsoNormal style='text-indent:21.0pt'><span style='font-family:宋体'>文档共享权限是设置文档目录下的文档那些人可以操作，操作的类型有可查看、可编辑、完全控制。</span></p>

<p class=MsoNormal><span lang=EN-US>&nbsp;</span></p>

src="temp.files/image229.jpg"></span></p>

style='font-family:宋体'>文档共享权限设置总界面</span></p>

<p class=MsoNormal><span style='font-family:宋体'>人员、机构的选择和文档创建权限类似。</span></p>
