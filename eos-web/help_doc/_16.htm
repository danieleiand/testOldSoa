<div class=Section1 style='layout-grid:15.6pt'>



<p class=MsoNormal style='text-indent:21.0pt'><span style='font-family:宋体'>点击系统菜单</span><span
lang=EN-US> SOA</span><span style='font-family:宋体'>平台</span><span lang=EN-US>
&gt;&gt; </span><span style='font-family:宋体'>个人办公</span><span lang=EN-US>&gt;&gt;
</span><span style='font-family:宋体'>我的日程</span></p>

<p class=MsoNormal><span lang=EN-US><img border=0 width=697 height=329
src="temp.files/image018.jpg"></span></p>

<p class=MsoNormal><span style='font-family:宋体'>在日历上要添加日程或者事件的日期上点击鼠标，弹出增加日程界面：</span></p>

<p class=MsoNormal><span lang=EN-US><img border=0 width=508 height=321
src="temp.files/image019.jpg"></span></p>

<p class=MsoNormal><span style='font-family:宋体'>输入日程标题，类型，紧急程度，开始结束时间，选择是否全天事件，日程详细内容等信息</span></p>

<p class=MsoNormal><span style='font-family:宋体'>点击保存，增加界面关闭，可以看到在日程日历上增加了一条日程安排。</span></p>

<p class=MsoNormal><span lang=EN-US>&nbsp;</span></p>
