<p class=MsoNormal style='margin-left:21.0pt'><span style='font-family:宋体'>在这里可以查询到所有已录入系统的公司人员公开的个人信息和联系方式等资料！方便员工之间互相沟通！</span></p>

<p class=MsoNormal><span lang=EN-US>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span><span
style='font-family:宋体'>如果你安装并配置正确了</span><span lang=EN-US>RTX</span><span

style='font-family:宋体'>帐号，而无需再次输入</span><span lang=EN-US>RTX</span><span
style='font-family:宋体'>密码。</span></p>

<p class=MsoNormal><span lang=EN-US>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span><span
style='font-family:宋体'>在你的</span><span lang=EN-US>RTX</span><span
style='font-family:宋体'>成功登录的基础上，你可以直接在通讯录中提供的</span><span lang=EN-US>RTX</span><span
style='font-family:宋体'>快捷功能菜单中，便捷的和其他同事用</span><span lang=EN-US>RTX</span><span
style='font-family:宋体'>进行交流。</span></p>
