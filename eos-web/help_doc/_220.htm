<div class=Section1 style='layout-grid:15.6pt'>



<p class=MsoNormal style='text-indent:21.0pt'><span style='font-family:宋体'>文档目录树显示是显示当前登录用户可以创建的文档目录树形结构。我的文档查询显示我创建和别人替我创建的所有文档，在列表中可以对文档进行如下操作：查看，编辑，删除（逻辑删除），共享（该文档对应的子目录必须为可以共享），日志。</span></p>

<p class=MsoNormal style='text-indent:21.0pt'><span style='font-family:宋体'>文档状态有</span><span
class=htmltxt1><span style='font-family:宋体'>草稿，待审批，正常</span></span><span
class=htmltxt1><span lang=EN-US style='font-family:"Courier New"'>(</span></span><span
class=htmltxt1><span style='font-family:宋体'>已发布</span></span><span
class=htmltxt1><span lang=EN-US style='font-family:"Courier New"'>)</span></span><span
class=htmltxt1><span style='font-family:宋体'>，退回，删除</span></span><span
class=htmltxt1><span lang=EN-US style='font-family:"Courier New"'>(</span></span><span
class=htmltxt1><span style='font-family:宋体'>逻辑删除</span></span><span
class=htmltxt1><span lang=EN-US style='font-family:"Courier New"'>)</span></span><span
class=htmltxt1><span style='font-family:宋体'>，归档。只有超级管理员才有权限对文档进行物理删除，物理删除后所有关联此文档的信息将被删除。</span></span></p>


</div>
