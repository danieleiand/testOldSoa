<div class=Section1 style='layout-grid:15.6pt'>



<p class=MsoNormal style='text-indent:21.0pt'><span style='font-family:宋体'>如果需要修改操作信息，先选择一条操作员列表前的复选框，使之保持选择状态，下方的修改按钮会被选中，由于一次只能修改一条记录如果选择多条记录，修改按钮会出现无效状态，</span></p>

<p class=MsoNormal style='text-indent:21.0pt'><span style='font-family:宋体'>点击修改按钮，弹出操作员修改界面；</span></p>

<p class=MsoNormal style='text-indent:21.0pt'><span lang=EN-US><img border=0
width=525 height=216 src="temp.files/image017.jpg"></span></p>

<p class=MsoNormal style='text-indent:21.0pt'><span style='font-family:宋体'>修改操作员信息，点击保存，修改页面自动关闭，并刷新之前的操作员列表，可以看到新的操作员信息。</span></p>
