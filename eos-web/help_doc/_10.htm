      <td class="moHeader">&nbsp;2.4.1 新增操作员</td>
    </tr>
  </table>
  
  <p></p>

<div class=Section1 style='layout-grid:15.6pt'>



<p class=MsoNormal style='text-indent:21.0pt'><span style='font-family:宋体'>点击系统菜单</span><span
lang=EN-US> SOA</span><span style='font-family:宋体'>平台</span><span lang=EN-US>
&gt;&gt; </span><span style='font-family:宋体'>认证授权</span><span lang=EN-US>&gt;&gt;
</span><span style='font-family:宋体'>操作员管理</span></p>

<p class=MsoNormal style='text-indent:21.0pt'><span lang=EN-US><img border=0
width=697 height=292 src="temp.files/image015.jpg"></span></p>

<p class=MsoNormal style='text-indent:21.0pt'><span style='font-family:宋体'>点击新增按钮</span></p>

<p class=MsoNormal style='text-indent:21.0pt'><span style='font-family:宋体'>弹出操作员的新增页面</span></p>

<p class=MsoNormal style='text-indent:21.0pt'><span lang=EN-US><img border=0
width=526 height=219 src="temp.files/image016.jpg"></span></p>

<p class=MsoNormal style='text-indent:21.0pt'><span style='font-family:宋体'>输入登录用户名，用户密码，操作员名称等必要信息</span></p>

<p class=MsoNormal style='text-indent:21.0pt'><span style='font-family:宋体'>点击保存，新增页面会自动关闭</span></p>

<p class=MsoNormal style='text-indent:21.0pt'><span style='font-family:宋体'>并刷新之前的操作员列表，可以看到新的操作员被加入了。</span></p>


</div>
