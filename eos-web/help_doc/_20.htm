      <td class="moHeader">&nbsp;3.2.1 便签组件使用</td>
    </tr>
  </table>
  
  <p></p>

<div class=Section1 style='layout-grid:15.6pt'>



<p class=MsoNormal style='margin-left:21.0pt'><span style='font-family:宋体'>用户登录系统后点击【个人办公】主题，右边有我的便签组件。</span></p>

<p class=MsoNormal><span lang=EN-US><img border=0 width=697 height=255
src="temp.files/image022.jpg"></span></p>

<p class=MsoNormal><span style='font-family:宋体'>在我的便签组件中，点击【新建便签】弹出录入便签界面：</span></p>

<p class=MsoNormal><span lang=EN-US><img border=0 width=310 height=253
src="temp.files/image023.jpg"><img border=0 width=310 height=246
src="temp.files/image024.jpg"></span></p>

<p class=MsoNormal><span style='font-family:宋体'>输入便签内容，点击【保存】，显示最近</span><span
lang=EN-US>10</span><span style='font-family:宋体'>条便签列表；</span></p>

<p class=MsoNormal><span style='font-family:宋体'>点击标题右边的</span><span lang=EN-US><img
border=0 width=27 height=18 src="temp.files/image025.jpg"></span><span
style='font-family:宋体'>图标，可以删除该便签；</span></p>

<p class=MsoNormal><span style='font-family:宋体'>点击【便签标题】弹出该便签的修改界面，可以继续录入或者更改便签内容；</span></p>

<p class=MsoNormal><span style='font-family:宋体'>点击【更多</span><span lang=EN-US>&gt;&gt;&gt;</span><span
style='font-family:宋体'>】切换到历史便签列表管理界面</span></p>

<p class=MsoNormal><span lang=EN-US><img border=0 width=697 height=196
src="temp.files/image026.jpg"></span></p>

<p class=MsoNormal><span lang=EN-US>&nbsp;</span></p>
