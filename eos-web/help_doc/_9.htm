<p class=MsoNormal style='text-indent:21.0pt'><span style='font-family:宋体'>所有能登录系统的用户都是系统中的操作员，需要增加登录账号有两种方式一种是在操作员管理中增加，第二种是在机构人员管理中关联一个操作员，如果操作员的登录名不存在会创建一个新的操作员，下面介绍如果通过操作员管理界面来维护操作员。</span></p>
