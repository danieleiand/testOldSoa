<div class=Section1 style='layout-grid:15.6pt'>



<p class=MsoNormal style='text-indent:21.0pt'><span style='font-family:宋体'>如果需要删除日程信息，请在日历界面上，点击日程项目（蓝色条状），弹出该日程修改界面：</span></p>

<p class=MsoNormal><span lang=EN-US><img border=0 width=670 height=517
src="temp.files/image020.jpg"></span></p>

<p class=MsoNormal><b><span style='font-family:宋体'>点击删除。</span></b></p>

<p class=MsoNormal><span style='font-family:宋体'>你也可以切换到日程管理列表界面：</span></p>

<p class=MsoNormal><span lang=EN-US><img border=0 width=697 height=204
src="temp.files/image021.jpg"></span></p>

<p class=MsoNormal><span style='font-family:宋体'>在这里选择要删除的日程，点击删除！可以选择多条记录！</span></p>
